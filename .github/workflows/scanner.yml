name: Leveraged ETF Weekly Returns

on:
  workflow_dispatch:
  schedule:
    - cron: "10 7 * * 1-5"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install finance-datareader pandas yfinance

      - name: Run script
        run: |
          python scanner.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: leveraged-etf-output
          path: output/
